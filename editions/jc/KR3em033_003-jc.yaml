body:
  text: 卷三古今治法論咽喉之證古方書有十八證又增為二十四證又增為三十二證復又增為七十二證命名各殊治法亦異眩人心目茲擇古今治法至平至效者詳列於左學者宜致思焉一曰喉痹痹者痛也經云一陰一陽結謂之喉痹一陰者手少陰心也一陽者手少陽三焦也心為君火三焦為相火二火沖摯咽喉痹痛法當散之清之加味甘桔湯主之又有非時暴寒潛伏於少陰經越旬日而後發名伏氣咽痛俗云腎傷寒是已法當辛溫以散之半夏桂甘湯主之復有少陰中寒之重證寒客下焦逼其無根失守之火發揚於上遂致咽痛其證手足厥冷脈沉細下利清穀但用理中四逆湯療寒而咽痛自止斯二者寒也其他悉屬熱證不可不知二曰纏喉風咽喉腫痛脹塞紅絲纏繞故名纏喉風其證口吐涎沫食物難入甚則腫達於外頭如蛇纏先用黃汁調元明粉少許灌喉中攪去其痰次用蜜水潤之若汁不能拔痰則用土牛膝連根搗爛和酸醋灌之如頑痰膠固吐仍不出咽喉脹閉不通滴水難入者則用解毒雄黃丸極酸醋磨下七丸自然得吐而通既通可用牛黃清心丸加味甘桔湯如腫勢達外延及頸項頭面紅如火光藥力難敵急用磁鋒砭出惡血用雞子清調乳香末潤之立瘥或用芭蕉根汁潤之以解其毒若口中腫脹紫黑急用銀針刺去其血或用小刀點之隨以淡鹽湯洗之吹上冰片散更有腫在喉里針法難施急刺手少商穴出血則喉花自開仍以解毒雄黃丸灌之自然通透此等病勢危惡非吐痰解毒煎丸並進刀針砭石按法善施鮮克有濟也治此者平時揣摩純熟臨證庶能措手幸毋輕忽緩以誤人也三曰走馬喉風喉舌之間暴發暴腫轉腫轉大名走馬喉風又名飛瘍不即治急殺人用小刀點出血淡鹽湯洗之吹以冰片散仍服加味甘桔湯加金銀花一二兩若牙關緊急則用搐鼻散吹鼻中隨以解毒雄黃丸醋磨灌之太乙紫金丹亦佳紫金丹治咽喉等證無往不神驗也四曰纏舌喉風硬舌根而爛兩傍急服加味甘桔湯吹冰片散緩則不救若有爛處以頭髮作子用甘草湯洗淨然後吹藥五曰雙單乳蛾狀如乳頭生喉間一邊生者名單乳蛾兩邊生者名雙乳蛾宜用韭菜汁調元明粉灌去痰涎吹以冰片散隨服甘桔湯自應消散若不消散以小刀點乳頭上出血立瘥凡針乳蛾宜針頭尾不可針中間鮮血者易治血黑而少者難痊凡用刀針血不止者用廣三七末嚼敷刀口上凡用刀針不可誤傷蒂丁損則不救慎之慎之六曰喉疔形似鞋疔但差長耳先用小刀點刺隨用冰片散吹之以甘桔湯多加菊花煎飲之菊花連根帶葉皆消疔之聖藥也每四兩煎湯頻服一切疔腫皆散自然汁尤妙七曰木舌重舌蓮花舌此心火熾盛致然也用水洗去舌上白苔垢若有黑處用小刀點破去瘀血吹冰片散服甘桔湯加黃連若蓮花舌靠牙而起數峰中不可針宜針兩傍針中間恐傷舌根也根傷則不能收功凡口內使刀針有兩處不可傷一蒂丁二舌下根切不可傷至要至要又舌衄證出血不止甘桔湯倍加生地丹皮冰片散亦可吹八曰懸癰生於上齶形如紫李此脾經蘊熱所致不急治恐毒氣上攻腦則不可救宜用銀針針破癰頭用鹽湯攪盡瘀血然後吹以冰片散仍服加味甘桔湯九曰兜腮癰生腮下纏喉壅腫先用韭汁調元明粉攪去其痰再看其紫黑處針之以鹽湯攪去其血吹以冰片散仍服甘桔湯若飲食不入急用解毒雄黃丸醋磨七丸大凡腮腫膿從口中出者易治膿從腮外出者難痊穿破故也十曰喉瘡少陰腎經陰火上衝也宜用韭汁探去其痰若瘡勢灌膿以銀針挑破之隨用荊芥湯洗之再吹冰片散飲以甘桔湯其上齶生瘡脾熱也舌上生瘡心熱也吹服如前法十一曰走馬牙疳牙間紅腫漸變紫黑臭穢此胃經濕熱也以石膏薄荷湯漱之再吹同氣散速服清胃散十二曰牙癰牙邊腫痛如豆大脾胃二經濕熱也可用小刀點破之吹冰片散服清胃散又牙宣證牙根盡腫宣露於外或齒衄不止並服前方仍用陳茶薄荷銀花等頻服之再用冰片散搽之十三曰喉瘤生於喉旁形如圓眼血絲相裹此肺經蘊熱所致不可用刀針宜吹麝香散甘桔湯切忌多言耗神有一人口內生肉球有根線長五寸余吐球出方可飲食以手輕捻痛徹至心因用疏風降火藥每加麝香五分仍用麝香散吹之三日根化而愈十四曰繭唇唇上起小泡漸腫漸大如繭此心脾鬱熱所致初起時即用艾絨如麥粒大灸之仍服甘桔湯加香附遠志之類十五曰肺絕喉痹凡喉痹日久頻服清降之藥以致痰涎壅於咽喉聲如拽鋸此肺氣將絕之候也法在難治宜人參膏加橘紅湯飲之或用四君子湯亦佳十六曰經閉喉腫女人經水不調壅塞經脈亦令喉腫宜用四物湯加牛膝茺蔚子香附桃仁之類俾經脈流通其腫自消也又有梅核氣症男婦皆同喉中如有物吞不入吐不出宜用甘桔湯加蘇杆橘紅香附金沸草之類漸次可愈凡治咽喉口舌之症初則疏風解毒繼則滋水養陰若元氣漸虛急顧脾胃加六味滋水四君補脾皆為要藥否則真氣虧敗勢難挽矣治者審之以上十六條皆出心悟書咽喉病名單乳蛾雙乳蛾喉閉纏喉風急喉痹懸雍垂梅核氣屍咽谷賊骨鯁咽痛咽瘡直拍咽喉病名單乳蛾雙乳蛾其形似乳蛾一為單二為雙醫鏗單蛾風者其形圓如小箸頭大生於咽喉關上或左或右關下難治雙蛾風者有兩枚在喉關兩邊亦圓如小箸頭大關下難治得效其乳蛾之差小者名曰喉閉醫鑑喉痹多是痰熱丹心纏喉風喉閉之證皆由膈間素有痰涎或因酒色七情不節而作火動痰壅塞咽喉所以內外腫痛水漿不入可謂危且急矣丹心喉痹者謂喉中呼吸不通言語不出而天氣塞也綱目宜用如聖勝金錠解毒雄黃丸牛黃涼膈丸七寶散蟾礬散雞內金散備急丹龍腦膏青龍膽吹喉散實火宜清涼散虛火加味四物湯急喉痹靈樞經曰瘡發咽嗌名曰猛殖此疾治遲則咽塞咽塞則氣不通氣不通則半日死喉閉而暴發暴死者名曰走馬喉痹醫鑑夫喉之為會厭者經謂之吸門是也以其司呼吸主升降為人身之緊關橐鑰門戶也若夫卒然腫痛水漿不入言語不通死在須臾誠可驚駭正傳宜速用針法吐法以救之藥不得下當以曲竹管灌藥入喉為妙類聚急喉痹其聲如鼾有如痰在喉音者此為肺絕之候宜速用人參遲則不救綱目孫兆治潘元從急喉以藥半錢吹入喉中少頃吐出膿血立愈潘謝曰大急之患非明公不能救非藥不能療贈金百兩願求其方孫曰豬牙皂角白礬黃連等分瓦上焙為末耳既授以方不受所贈回春牙關緊者須開關用一字散二仙散毒結宜如聖勝金錠解毒雄黃丸龍腦破毒散奪命散玉鑰匙金鑰匙巴豆煙喉氣不通冷水徐灌之山居纏喉風熱結咽喉腫達於外且麻且癢腫而大者名纏喉風醫鑑纏喉風自耳邊過頰下赤兔者是也大概內外皆腫者為纏喉風得效纏喉風之證先兩日胸膈氣緊出氣短促忽然咽喉腫痛手足厥冷氣閉不通頃刻不治丹心纏喉風屬痰熱其咽喉裡外皆腫者是也丹心宜用解毒雄黃丸勝金錠龍腦破毒散一字散二仙散玉鑰匙巴豆煙雄黃散佛手散白礬散冰梅丸兼用針法吐法乃效懸雍垂懸雍生於上齶雖不關於咽喉所以暴腫者抑亦熱使然也直指懸雍謂之蒂鍾脹而垂下有長數寸者謂之蒂鍾風宜用鹽礬散不可針破針則殺人得效懸雍者音聲之關若臟腑伏熱上衝咽喉則長而腫也宜吹喉散元參散硼砂散類聚腎傷寒咽痛及蒂鍾腫者忌針以蛇床子於瓶中燒煙令病人吸入喉中立愈入門梅核氣噙化丸膽礬硼砂明礬牙皂雄黃細末紅棗煮爛取肉為丸空心噙化溫黃酒一盅過口內服蘇子降氣湯七情氣鬱結成痰涎隨氣聚積堅大如塊在心腹間或塞咽喉如梅核粉絮樣咯不出咽不下每發欲絕逆害飲食宜四七湯得效男女或有胸喉之間梅核作恙者觸事勿怒飲食勿冷直指梅核氣者窒礙於咽喉之間咯不出咽不下如梅核之狀是也始因喜怒大過積熱蘊隆乃成痰鬱結致斯疾耳加味四七湯加二陳湯醫鑑屍咽屍咽者陰陽不和脾肺壅盛風熱毒氣又不能通故令屍蟲發動上蝕於喉或癢或痛如之候也與傷寒狐惑同當參考谷賊谷賊者谷芒強澀藏於米而誤食之滯於咽門不能傳化故風熱並聚與血氣不遂令肺刺也不急治亦能殺人誤吞稻麥芒在咽間不下急取鵝口中涎灌之即下蓋鵝涎能化谷也綱目骨鯁見藥方主治內咽喉瘡咽瘡者胃脘實熱熏炙上焦發為白頭赤根宜發聲散直指咽喉生瘡痛多屬虛火上行無制客於咽喉宜用人參荊芥蜜炙黃柏切忌生薑辛辣動火也楊梅結毒有喉間潰爛作痛久不愈者此非喉痹之屬乃楊梅結毒也宜仙遺糧湯甚者土茯苓湯吞五寶丹咽喉急閉宜針咽喉急閉皆屬相火惟砭刺出血最為上策正傳喉痹因惡血不散故也凡治此疾暴者必先發散次則取痰次去瘀血宜針之綱目凡喉痹急證先用針刺出血並豁吐痰涎為要若遲緩不救則死回春火鬱則發之砭刺出血即汗之之義也血出多則愈有針瘡者薑汁調水時時呷之凡關上血泡最宜針關下不見者令病人含水一日用蘆管尖刺鼻孔出血妙入門咽喉腫痛惟腎傷寒及蒂鍾風忌針入門咽喉急閉宜吐凡喉痹不論大人小兒非吐不可如膽礬石膏之類薄荷汁入醋同調雞羽蘸藥逆入喉內徐徐吐痰引出為佳湯氏喉痹多屬痰宜用吐法丹心宜用吹喉散引痰直捷法去涎方或醋噙漱亦好咽喉閉通治火性急速故病發則暴悍或針或吐以宣其毒此急則治標之法也必須兼以內經從治之法以桔梗甘草元參升麻防風羌活荊芥人參白朮茯苓之類少加乾薑防己為嚮導徐徐頻服不可頓服此為治之大法切不可驟用寒涼倘寒涼驟用上熱末除中寒復生至於發喘發脹皆為不治之證正傳喉痛必用荊芥陰虛火痰必用元參丹心咽喉腫痛諸證皆用清涼散加減用之回春通用冰梅丸龍腦川芎丸清咽利膈散必用方甘桔湯龍腦破毒散金鎖匙琥珀犀角膏咽喉不治證凡咽喉閉毒氣歸心胸前腫滿氣煩促下部洞泄不止者死得效凡喉痹初發胸膈氣促咽喉腫痛手足厥冷氣閉不通即死入門如魚口者死寶鑑喉內熱結喉外腫繞且麻且癢喉內痰塞滿舌作音如鼾除肺絕證惟喉痹誤服寒涼有此證也痰塞氣無出入多死急用桐油煎取痰隨用桂薑湯證治全書陰虛喉疳此證初覺咽嗌乾燥如毛草常刺喉中又如硬物嗌於嚥下嘔吐酸水噦出甜涎淡紅微腫微痛日久其色紫暗不鮮頗似凍榴子色由腎液久虧相火上炎消爍肺金熏燎咽喉腫痛日增破爛疊若蝦皮聲音雌啞喘急多痰臭腐蝕延其疼倍增妨礙飲食胃氣由此漸衰而虛火益盛煩躁者宜服知柏地黃湯若吐酸穢涎者宜服甘露飲加黃連便燥者兼服萬氏潤燥膏面唇淡白不寐懶食者宜歸脾湯加酒炒黃連腫吹紫雪散腐吹八實散珍珠散其證投方應病十痊一二否則難救咽喉怪證咽喉生瘡層層如疊不痛日久有竅出臭氣廢飲食用臭橘葉煎湯連服必愈按臭橘一名枸橘即俗名鐵籬笆陰虛咳嗽久之喉中痛者必有瘡名肺花瘡坎離丸加元參桔梗不可用冰片吹藥恐辛散轉增潰也坎離丸即知柏四物湯加蜜為丸
