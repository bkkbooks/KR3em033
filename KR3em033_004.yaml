body:
  text: 卷四古今方藥主治分類風熱腫痹荊防敗毒散活人甘桔湯金匱本方加防風荊芥連翹名如聖散宋仁宗治上焦風熱增損如聖湯寶鑑治風熱攻衝會厭語聲不出煩悶腫痛桔梗一兩炙草一兩五錢枳殼三錢北風五錢利膈湯本事治咽痛口瘡雞蘇葉荊芥北風桔梗人參大力子甘草甚者加殭蠶荊芥湯三因治咽喉腫痛語聲不出咽之痛甚荊芥五錢桔梗二兩甘草一兩桔梗湯東垣麻黃桔梗黃芩甘草殭蠶馬勃桂枝當歸食後徐徐呷之吹藥解毒雄黃丸和劑雄黃研飛鬱金各一兩巴豆去皮出油十四枚為細末醋煮麵糊為丸如緑豆大熱茶清下七丸吐出頑痰立愈玉鑰匙三因治風熱喉痹及纏喉風芒硝七錢半硼砂二錢半白殭蠶一錢二分龍腦一字共研細末吹入立效備急丹綱目青黛朴硝殭蠶各一兩甘草四兩為末臘月牛膽有黃者更妙盛藥陰四十九日為末吹喉神效開關散白殭蠶炒白礬半生半熟共研細末每用一錢自然薑汁調灌吐出頑痰小兒加薄荷少許龍腦膏治喉痹腫痛蘇薄荷甘草北風川芎桔梗芒硝白豆蔻砂仁片腦為末蜜丸彈子大噙化咽下痰涎結痹四七湯三因治痰涎結聚咯不出咽不下法夏薑汁炒五錢厚朴薑汁炒三錢雲苓四錢紫蘇二錢薑棗合煎四味湯治咽喉中如有物咽吐不利厚朴刮去粗皮薑汁浸炙黃法夏生薑汁浸一宿水去滑切碎廣皮水浸去白焙各一兩赤茯苓刮去黑皮二兩杏仁煎丸治咽喉食即咽塞如有物不下杏仁浸去皮煎及雙仁炒五錢官桂去粗皮枇杷葉拭去毛炙人參各一兩蘇子降氣湯局方蘇子法夏前胡厚朴薑汁炒橘紅秦歸炙草上桂金沸草散活人旋覆前胡細辛荊芥赤苓法半夏甘草玉鎖匙用巴豆壓油於紙上擰成條子點燃滅火以煙燻鼻中一時鼻若流涕其關即開金鑰匙寶鑑治喉閉纏喉風痰涎壅塞口噤不開芒硝一兩五錢硼砂五錢上片二分半殭蠶一錢雄黃二錢為細末吹之奪喉散寶鑑治急喉閉枯白礬白殭蠶炒硼砂皂角細末吹少許喉中痰出即瘥通關散紫珍一切喉症口噤不開痰涎壅塞厥逆不知人事牙皂莢一兩瓦上焙乾存性川芎五錢為末吹鼻中取嚏喉中取痰或症已成膿怕下針刀候熟時用此入鼻其膿自出二仙散入門治纏喉風急喉痹牙關緊急痰涎壅塞膽礬一錢殭蠶一錢為末吹之白玉散準繩治纏風單閉癰痹諸症牙關緊急人事不知白礬三錢巴豆三個分作六片入銚慢火同炒候礬枯去豆取礬為末水調灌下或吹喉中或雞子清調灌入喉元明醋紫珍喉已破爛者忌用元明粉一錢和好醋一盅以羽毛攪吐稠痰即愈巴豆煙寶鑑治喉閉危急宜開關見上玉鎖匙桐油煎古方至平至善取痰第一驗方也又土牛膝根臼內搗汁和醋灌之喉痹乳蛾新鮮牛膝根一握艾葉七片搗和人乳取汁灌入鼻內須臾痰涎從口鼻出即愈以上等方只有肺絶喉痹痰涎如鋸者忌用土牛膝治咽痛服用諸藥不效者此非咽痛乃是鼻中生一條紅線如發懸一黑泡大如櫻珠垂挂咽門口中飲食不入取土牛膝根直而獨條者洗淨入好醋三五滴同研滴入鼻孔絲斷珠破其病立安余按風熱喉痹痰涎壅甚屢用荊防敗毒散加殭蠶薄荷且噙且服亦效實熱腫痛清咽利膈湯金鑑牛子連翹防風荊芥梔子桔梗元參云連銀花黃芩薄荷甘草西莊朴硝淡竹葉同煎黃連瀉心湯黃連山梔荊芥黃芩連翹木通薄荷牛子甘草燈心二十根食後服廣筆鼠占湯生地貝母元參甘草牛子花粉射干連翹殭蠶苦竹葉二十片同煎金花丸紫珍黃連黃柏黃芩大黃自利去大黃加山梔抽薪飲黃芩石斛木通梔子黃柏枳殼澤瀉甘草徙薪飲廣皮黃芩寸冬芍藥黃柏雲苓丹皮清涼散金鑑吹藥硼砂人中白川連薄荷青黛冰片緑袍散川柏米泔水泡曬乾為末豆根青黛清上丸尊生治喉中一切熱毒熊膽一分明雄五分硼砂一錢薄荷葉五錢青鹽五分膽礬少許蜜丸壓舌下化入柳花散心悟治喉瘡口舌生瘡咽喉腫痛諸症洋黛蒲黃炒黃柏炒人中白各一兩冰片五分硼砂五錢冰片散心悟冰片一錢硼砂五錢明雄二錢黃柏蜜炙三錢靛花二錢炙草三錢雞內金燒存性一錢人中白煅五錢川連二錢元明粉二錢銅青煅五分蒲黃炒三錢共細末吹之一方加牛黃熊膽珍珠各一錢兒茶八分麝香三分白降雪散金鑑治緊喉風諸症石膏一錢五分硼砂一錢芒硝膽礬各五分元明粉三分冰片二分冰梅丸寶鑑治十八種喉痹俱效又治喉風腫痛如神天南星三十五個大半夏四兩白礬四兩白鹽四兩防風四兩桔梗二兩朴硝四兩甘草一兩大梅實一百個先將硝鹽水浸一伏時然後將各藥研碎入水拌勻方將梅實置水中其水淹過梅實三指為度浸七日取出曬乾又入水中浸透曬乾以藥水盡為度將梅實入封磁瓶密封起霜如白衣者佳用時綿裹含口內徐徐咽汁痰出即愈虛熱腫痛甘露飲局方生地熟地天冬麥冬石斛茵陳黃芩枳殼枇杷葉甘草本事方加犀角甚有道理知柏地黃湯玄麥地黃湯一陰煎全書生地熟地芍藥寸冬甘草牛膝丹參二陰煎生地寸冬棗仁甘草元參云連茯苓木通四陰煎生地寸冬白芍百合沙參雲苓甘草加減一陰煎生地芍藥寸冬熟地知母全皮炙草咽藥琥珀犀角膏準繩治咽喉口舌瘡菌琥珀犀角屑生用一錢人參棗仁去皮研茯神去皮木辰砂研各二錢片腦一字蜜丸以磁器收貯每服一丸以麥冬去心濃煎湯化下牛黃益金散虛熱瘡痛川柏蜜炙熟白硼砂白殭蠶牛黃或加上片共細末含咽之陰虛喉痛六味地黃湯七味地黃湯即六味加上桂大補元煎人參淮藥熟地杜仲秦歸棗皮北杞炙草陳氏加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙根潰蝕咽喉疼痛憔悴等證此臨川陳自明方六味丸加一桂五味子炒用澤瀉切片蒸五次焙用歸脾湯金鑑加酒炒黃連治陰虛喉疳面唇淡白不寐懶食萬氏潤燥膏豬脂一斤切碎煉油去渣加煉過白蜜一斤攪勻候凝挑服八寶珍珠散治陰虛喉疳腐爛兒茶川連川貝洋黛各錢半紅褐燒灰存性官粉川柏魚腦石微煅琥珀各一錢人中白二錢煅硼砂八分冰片六分牛黃珍珠各五分豆腐內煮半炷香時取出研末麝香三分各研極細末共兌再研吹之牛黃益金散治陰虛喉癬仍內服滋補真陰之劑陽虛喉痛補中益氣湯治脾陽虛喉痛八味地黃湯治腎中陽虛喉痛鎮陰煎治格陽喉痹熟地牛膝炙草澤瀉上桂附子四逆湯蜜附子含咽之陰寒咽痛四逆湯仲景附子乾薑甘草加桔梗理中湯白朮人參乾薑炙草客寒咽痛半夏桂甘湯活人法夏桂枝甘草生薑乾薑散三因乾薑半夏細末著舌上咽津蛇床子治腎傷寒咽痛用此入壺內燒煙燻之瘟毒喉痹普濟消毒飲東垣治大頭天行憎寒體重頭面腫盛咽喉不利黃芩酒炒黃連酒炒廣皮去白甘草生用元參連翹板藍根馬勃牛子薄荷殭蠶升麻紅胡桔梗二聖救苦丸紫珍治傷寒溫疫不問傳經過經俱可服並治大頭腫毒目赤咽腫錦紋大黃四兩酒拌蒸曬乾牙皂一兩各取末用山豆根三兩煎汁和煉蜜丸每服三錢牛膝一錢半煎湯下小兒減半老人虛人禁用如不得已用參耆當歸各二錢湯下內府仙方治腫項蝦蟆瘟殭蠶二兩薑黃二錢半蟬蛻一兩大黃三兩取細末薑汁打糊為丸重一錢大人服一丸小兒半丸蜜水調服又方真靛花三錢火酒一盅雞子清一個和勻服下不時即消附寒疫吹藥陳氏祕方治寒疫喉痹一白如雲俗名白喉嚨附子上桂人中黃共末吹之並無他藥可用葵絲症上齶上一條如挂麵頭子取下放碗內針挑大的這一頭看中間是空的治法用吹藥先用去涎藥次用上寸頭梅三分八寶丹三分明雄三分兌吹不過三次其絲必落落後獨用片棗藥兌明雄銀硃倘絲不去不治已去復生不治口起泡凡小舌下症有口起泡破爛者去涎藥重加茶羔吹之次吹八寶丹兌明雄茶羔若有紅白點子略加銀硃必效喉生紅豆凡生喉後喉關不拘內外忽生一點如紅豆漸長不收名蹲子喉用明雄黃八寶丹棗藥吹之針後不止血凡針後血不止用線絲瓜穰連皮子松樹皮去油合煎湯噙之立止凡咽喉用針後針創不合宜用抖薑塊和以熟白湯時時呷之創口易合骨鯁凡雞鵝豬魚骨鯁用葳靈仙五錢砂仁三錢甘草二錢煎噙嗽入喉呵氣即化危急者用蛇床三錢焙研細末紅糖兩許開水沖和咽下即化又方用山楂根燒灰存性研末吹之治煙袋傷喉用生靈仙汁兌乳汁男點左鼻女點右鼻喉關立開開後用螃蟹汁拌茶羔點之又方用陳蒲扇燒灰存性冰片少許和末吹傷處治火毒凡水毒症頸項腫痛用青膽石螺頭三尺深黃土陳茶葉調敷又方用人中白黃牛糞熱的燕子泥陳茶調熱敷胃窩並患處牙疳凡牙疳風牙關不開用硼砂青礬石菖蒲煎水噙之再用蔥頭麻根藠頭石菖蒲共抖熱敷喉爛吹藥方見陰虛火燥下槐花三錢洋茶云連淮漆各一錢為末夏月西瓜水調服冬月生梨汁調服治咽喉結毒成疳久不收口方整蛇蛻一條剪去頭尾壁錢七個冰片三分蛇蛻壁錢陰陽瓦煅存性治天白蟻瘡盛錫用曰咽喉內生瘡鼻孔俱爛者名曰天白蟻瘡此症方書不多載有不識誤作喉風醫最誤事此乃肺脾蘊熱毒而成宜用穿山甲散治之白霜梅燒存性一個枯礬一錢穿山甲炒雄黃各五錢共研細末吹之竹刺入咽王不留行生能軟蔑煎服再吞糯米圓即下腫痛嗆血用麻葉嚼之愈食醋嗆喉甘膽丸甘草去皮二兩作二段用豬膽五個浸三日取出火上炙乾為末蜜丸每服四五十丸臨臥茶湯送下治咽喉十八種急症如神回生救苦上清丹徐峨峰瘍醫白殭蠶燒存性一錢生硝尖煅硝尖白硼砂各五分明礬熟礬各二分海螵蛸三分冰片一分孕婦用麝法將原麝放杯內紙封緊固蒸一餐久兌藥吹之陰虛火躁參葉甘草去皮蒸一餐久薄葉少許共研末芳茶茶膏片棗偷油婆瓦上焙乾成末人中白合吹之爛喉嚨吹藥方芳茶茶膏片棗琥珀如無琥珀用松香火滴過為末吹之寒珠雙珠塞海巴豆抖爛紙包去盡油斑蝥焙乾共研末吹之或蜜糖調點少頃爛去後用甘草解巴豆毒青黛解斑蝥毒合煎水噙之或末藥吹亦可內關閉緊飲食難下方用鯽魚放水內去淨鱗破開去淨腸腹泥腮用九天飛瓦上焙黑將藥入鯽魚口內築入腹內然後將周身敷之用鐵鍋放水一碗急火文之去淨絲骨入鹼鹽漆醋連湯帶魚食之牙關緊閉烏梅燒焦牙皂北辛共細末搽牙上五月五日捉大路上螃蟹一隻取大夾子曬乾研末合藥吹寒珠雙珠塞海可消蛗子溜心蛾血當歸磨糯米泔水服小舌落下已上斷根用草藥煎水酒兌服與地黃同功凡蛾症先起如皂角子大形是圓的漸次有頭後有白頂涎甚其症亦惡寒發熱吹藥用八寶丹加明雄棗藥方茶青膽凡邊鰍形如馬蝗一條色白頭大尾小要看他頭從內關走出外關者名上水邊鰍從外而入內關者名下水邊鰍吹藥與蛾症同凡寒珠雙珠塞海形如桃李有紫脈赤絲有白朗即白點其症勢來得徐緩吹藥用八寶丹加明雄棗藥方茶螃夾凡白纏咽喉腫痛涎甚惡寒發熱形如棗核色白為白纏色黃為黃纏吹藥同蔡絲治法制鸕鷀膽法將膽用油紙包入活樟樹內或陳土磚內亦可夏一宿秋冬三日為度制人中白法一七用白水浸一日起三次二七用礬水浸每日起三次三七入活水內漂四七入泉水內漂漂一陳曬一陳五七每日蒸三次六七曬七七露然後不管幹與未乾要火焙臨用兌片與桂吹之加制人中白法人參葉元參寸冬甘草薄葉共文水將人中白攤瓦上焙以前藥水淬之焙乾再淬或三五七九次更妙制牙硝法牙硝一兩入鼎鍋內用水四茶碗慢火熬之分作三夜熬二夜減水一碗三夜減水二碗牙硝多少皆準此法加減熬至瓦灰色為度制棗藥法黑棗或南棗用細皺無破爛者將針挑去棗核入青礬於內棗之兩頭針孔處仍另用棗肉補塞勿令泄氣用草把二隻作十字架用粳頭放上面將棗放五方粳頭上再用粳頭蓋二三寸厚點燃候頂上粳頭色至焦黑起了油光取出棗只如未到功仍入火內再製制畢用碗盛杯蓋勿令泄氣候冷火氣扣如柴炭音聲色帶烏油黑者便佳如面上色帶灰白過火不燥只可吹陰虛症爛喉之類製片棗亦照前法制青魚膽取膽淨油懸當風處陰乾紙包放身上漚干研末如未乾切碎同藥乳之亦可八寶丹上麝二分梅片二分乳沒二錢明雄一錢硃砂一錢血竭一錢龍膽五分洋茶一錢銀硃一錢膽礬一錢雙月一錢火硝膏一錢枯礬一錢喜蛛三五七隻青魚膽用火制若是虛加山烏龜各味用瓦焙乾研末合成一單若喉爛者去麝不用附制山烏龜法用小便制一匕水皂一匕曬一匕陰一匕火焙研末聽用凡男子遺精淋濁症欲事過多女子崩帶及色欲傷泄試驗從小舌有根白絲直至上齶門牙以精血傷損故也若妊娠婦人從小舌有一根鮮紅絲直至上齶此藏精血以養胎也凡一切喉嚨所忌食物冬莧胡椒番椒其餘不忌凡乳蛾雙珠及寒珠等症腫痛極甚若過了七八九日疼痛略減是將潰時其根腳木紅頂現桃紅或淡紅而已用八寶丹加麝片及明雄吹上即穿膿盡開清涼藥隨症調理而愈
