body:
  text: 卷一類經咽喉經絡藏象任脈至咽喉督脈入喉俱經絡二十七衝脈任脈會於咽喉藏象十七足陽明循喉嚨手太陽循咽足少陽循喉嚨足厥陰循喉嚨之後上入頏顙手少陰支者上挾咽俱經絡二足少陽之別上挾咽足陽明上循咽足太陰合於陽明上行結於咽手少陰之正上走喉嚨手太陽循喉嚨俱經絡三足陽明挾咽之動脈經絡十上焦咽以上經絡二十三手厥陰出循喉嚨手陽明上循喉嚨經絡三嗌足太陰脈絡嗌疾病十三會厭厭小而疾薄則發氣疾其開合利厭大而厚則開合難其氣出遲足之少陰絡於橫骨終於會厭俱針刺四十五會厭之脈上絡任脈取之天突其厭乃發也天突為陰維任脈之會咽與喉各異靈樞經曰咽喉者水穀之道路也喉嚨者氣之所以上下也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸雍者音聲之開也頏顙者分氣之所泄也橫骨者神氣之所使主發舌者也咽喉人有二喉一軟一硬軟者居後是謂咽喉硬者居前是謂喉嚨會厭喉間之薄膜也周圍會合上連懸雍咽喉食息之道得以不亂者賴其遮壓故謂之會厭能開能合聲由以出懸雍俗謂之小舌當氣道之沖為咽間要會故謂之關頏顙頏頸也顙即頸中之喉顙當咽喉之上懸雍之後張口可見者也顙前有竅息通於鼻故為分氣之所泄橫骨即喉上之軟骨也下連心肺故為神氣之所使上連舌本故主發舌機內經曰喉主天氣咽主地氣又曰地氣通於嗌嗌謂咽喉下接連胸中肺氣葉之間也嗌即咽之底處也喉者候也咽者也咽接三脘以通胃故以之咽物喉通五臟以系肺故以之候氣氣喉谷咽皎然明白得效咽者胃之系喉者肺氣之所通咽以候物喉以候氣理一而分殊也直指咽者咽物之門戶也咽喉會厭與舌其用不同咽與喉會厭與舌此四者同在一門而其用各異喉以納氣故喉氣通於天咽以納食故咽氣通於地會厭管乎其上以司開合掩其喉則其食下不掩則其喉錯必舌抵上齶則會厭能開其喉矣四者交相為用闕一則飲食廢而死矣咽喉度數靈樞經曰咽門重十兩廣二寸半至胃長一尺六寸喉嚨重十二兩廣二寸長一尺二寸子和仙經曰絳宮重樓十二級人之喉嚨有十二節養性經義憂恚無言篇曰咽喉者水穀之道也喉嚨者氣之所以上下者也陰陽別論曰一陰一陽結謂之喉痹厥論曰手陽明少陽厥逆發喉痹嗌腫經脈篇曰足陽明之別上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑三焦手少陽也是動則病嗌腫喉痹小腸手太陽也是動則病嗌痛頷腫腎足少陰也是所生病口熱舌乾咽腫上氣嗌乾及痛骨空論曰督脈為病嗌乾五音五味篇曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口脈解篇曰厥陰所謂甚則嗌乾熱中者陰陽相薄而熱故嗌乾也奇病篇曰肝者中之將也取決於膽咽為之使厥病篇曰嗌乾口中熱如膠取足少陰雜病篇曰喉痹不能言取足陽明能言取手陽明熱病篇曰喉痹舌卷口中乾煩心心痛臂內廉痛不可及頭取手小指次指爪中下去端如韭葉繆刺論曰邪客於手少陽之絡令人喉痹舌卷口乾心煩刺手中指次指爪甲上去端如韭葉各一邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上刺足下中央之脈各三嗌中痛不能內唾時不能出唾者刺然骨之前出血立已左刺右右刺左六元正紀大論曰少陽司天三之氣喉痹目赤善暴死少陰司天嗌乾腫上至真要大論云歲太陰在泉嗌腫喉痹太陽在泉寒淫所勝民病嗌痛頜腫太陰之勝喉痹項強少陽司天客勝則丹疹外發喉痹頭痛嗌腫脈法兩寸脈浮洪而溢者喉痹也脈微而伏者死正傳咽喉之脈兩寸洪溢上盛下虛脈忌微伏針灸雙蛾玉液金津少商單蛾少商合骨廉泉咽喉腫閉甚者以細三稜針藏筆尖中戲言以沒藥點腫閉處乃刺之否則病人恐懼不能愈疾喉痛
