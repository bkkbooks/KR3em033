body:
  text: 跋道光丙申夏先父念咽喉為性命之關特博採群書古今方藥及家傳祕方集為一編名曰喉科大成藏之篋笥久矣鈺受先父口傳凡遇各症辨其虛實察其形色對症用方二十餘年百不失一誠喉科之津梁也然濟一方不若廣濟之為功更大故悉録出概不敢祕高明家毋以掛漏相笑而補以未逮焉則幸甚男傳鈺謹識
