body:
  text: 卷二喉痹論內經云一陰一陽結謂之喉痹王太僕云一陰者手少陰君火心主之脈氣也一陽者手少陽相火三焦之脈氣也二脈正絡於喉然氣熱則內結甚則腫脹腫甚則痹痹甚則不通而死原病式云痹者不仁也俗作閉猶閉塞也火主腫脹故熱客上焦而咽嗌腫脹也咽喉之疾反掌生死腫脹甚者急宜砭出血為尚然後用藥隨症調之子和云喉痹不歸之火相去遠矣然亦有伏氣病名腎傷寒謂非時暴寒伏毒於少陰始衰不病旬日乃發脈微弱法當咽痛次必下利當以辛熱藥攻其本病順其陰陽則水升火降而咽痛自己又有少陰傷寒不傳太陽寒邪抑鬱內格陽氣為熱上行於咽門經會之處寒熱相傳而成咽痹當以辛溫甘苦制其標病以通咽嗌二者若誤用寒涼卒致不救烏呼冤哉學者可不深究之指掌喉痹者謂喉中呼吸不通言語不出而天氣閉塞也咽痛及嗌痛者謂咽喉不能納唾與食而地氣閉也喉閉咽嗌痛者謂咽喉諸病天地之氣閉塞也十二經中惟足太陽主表別下項余經皆內循咽喉盡得以病之而繞在君相二火喉主天氣屬肺經變動為燥燥則澀而閉咽主地氣屬脾土變動為濕濕則腫而脹皆火鬱上焦致痰涎氣血結聚咽喉腫達於外麻癢且痛為纏喉風腫於兩旁為喉痹其單蛾雙蛾木舌舌脹纏喉風走馬喉風病同於火故不分也惟纏喉走馬殺人最速用針出血最為上策大抵無形腫閉者為痹有形腫痛者即是蛾先吐風痰急則治其標也後解熱毒緩則治其本也至於下寒過極逼令上熱反盛須用熱藥食前冷服內經所以有從治之法也更以脈而消息之必微弱可驗或數而無力不得誤用寒涼益促其危故實火須用正治虛火須用從治界限須審以上摘纂錦囊喉痹一證在古方書雖有十八證之辨而古人悉指為火然此證雖多由火而復有非火者不可不詳察也蓋火有真假凡實火可清者即真火證也虛火不宜清者即水虧證也且復有陰盛格陽者即真陽證也故內經曰太陽在泉寒淫所勝民病嗌痛頜腫其義即此何後人之弗究也喉痹所屬諸經凡少陽陽明厥陰少陰皆有此證但其中虛實各有不同蓋少陽厥陰為木火之臟固多熱證陽明為水穀之海而胃氣直透咽喉故又惟陽明之火為最盛欲辨此者但察其以情志鬱怒而起者多屬少陽厥陰以口腹肥甘辛熱太過而起者多屬陽明凡患此者多宜以實火論治至若少陰之候非此之比蓋少陰之脈結於橫骨終於會厭繫於舌本凡陰火逆衝於上多為喉痹但少陰之火有虛實不得類從火斷若果因實火自有火證火脈亦易知也若因酒色過度以致真陰虧損者此腎中之虛火證也非壯水不可又有火虛於下格陽於上此無根之火即腎中之真寒證也非溫補命門不可凡此諸經不同而虛實大異皆後人所罕知者獨褚氏遺書有上病察下之說誠見道之言也全書論治咽喉之病挾熱者十之六七挾寒者十之二三而風寒包火者則十中之八九古人開手一方只用甘草桔梗三因方加以荊芥其他蒡子薄荷貝母川連之類皆出後人續補可見咽喉之病不便輕用涼藥而專主升散開發者所謂結者開之火鬱發之是已及火勢極盛則清劑方施結熱下焦而攻法是用非得已也心悟凡火浮於上而熱結於頭面咽喉者最宜清降切不可用散風升陽等劑蓋此火由中得升愈熾經曰高者抑之正此之謂非火鬱宜發及升陽散火之義最當體察勿得誤認其面目全書二條各言其是學者須當參觀而互用之不可偏主喉痹惡寒極寸脈小弱於關尺者皆為表證宜甘桔湯半夏桂枝甘草湯詳寒熱發散之類婁善全云喉痹惡寒者皆是寒折熱寒閉於外熱鬱於內薑汁散其外寒則內熱得升而愈矣切忌膽礬酸寒等劑點喉反使其陽鬱結不伸又忌硝黃等寒劑下之反使陽氣下陷入里則禍不旋踵矣水漿不得入口者用解毒雄黃丸以酸醋磨化吐出濃痰間以生薑汁噙下之以表散藥升發之神效三因方治卒喉痹不得語小續命湯加杏仁甚妙活人半夏桂枝甘草湯治暴寒中人咽痛此外感風寒作喉痹者之治法也準繩喉痹不惡寒者及寸脈大滑實於關尺者皆屬下證宜青黛硝石等寒藥降之或白礬等酸劑收之韓祗和云寸脈大於關尺者宜消陽助陰東垣云兩寸脈實為陽盛陰虛下之則愈或三部俱實亦可用其法也準繩以上二論一寒一熱界限分明喉痹鄉村病皆相似者屬太行運氣之邪治必先表散之亦忌酸寒點藥郁邪於內不得外出也其病有二其一屬火經云少陽所至為喉痹又云少陽司天之政三之氣炎暑至民病喉痹治宜仲景甘桔湯或面赤斑者屬陽毒宜陽毒諸方汗之其一屬濕經云太陰之盛火氣內郁喉痹又云太陰在泉濕淫所盛病嗌腫喉痹治宜活人半夏桂枝甘草湯或面青黑者宜陰毒諸方汗之又解毒雄黃丸最妙準繩此論天行喉痹瘟毒喉痹乃天行瘟疫之氣其證則咽痛項腫甚有頸面項俱腫者北方尤多此病俗人呼為蝦蟆瘟又名鸕鷀瘟亦名大頭瘟此濕熱壅甚最凶之候宜清諸經之火或瀉陽明之熱當察緩急治之東垣普濟消毒飲最妙全書此論瘟毒喉痹經云寒氣客於會厭卒然如啞宜玉粉丸陳藏器每用治臟寒咽閉吞吐不利用附子去皮臍炮製以蜜塗炙之令蜜人內含之勿咽急痹有聲如鼾有如痰在喉音者此為肺絶之候速宜人參膏救之用薑汁竹瀝放開服十全七八風熱痰喉痹丹溪先飲以千紙湯次用知柏四物湯養陰則火降矣七情鬱結氣塞不通宜五香散血壅為痹宜取紅花汁服之或用茜草或土牛膝抖自然汁和醋服倘牙關緊急滴入鼻內亦可或馬鞭草亦好準繩咽喉如有物塞經云膽病者善太息口苦嘔宿汁嗌中介介然數唾取陽陵泉又云心咳之狀喉中介介如梗狀取心之俞仲景云婦人咽中如有炙臠半夏厚朴湯主之以上咽喉雜論各證須辨咽嗌痛咽唾與食則痛者是也經云形苦志苦病生於咽嗌治之以百藥又云肝者中之將也取決於膽咽為之使病喉痹者必兼咽嗌痛病咽嗌痛者不能兼喉痹也綱目陰氣大虛陽氣飛越痰結在上遂成咽痛脈必浮大重取必澀去死為近宜補陰斂陽人參一味濃煎細飲之此證皆是勞嗽日久者有之咽瘡多虛火遊行無制客於咽喉宜用人參蜜炙黃柏荊芥治之陰虛喉痹其證亦內熱口渴喉干或唇紅頰赤痰涎壅盛然必尺脈無神或六脈雖數而浮軟無力但察其過於酒色或素稟陰氣不足多倦少力者是皆腎陰虧損水不制火而然火甚者宜滋陰八味煎加減一陰煎之類主之火微而不喜冷物及大便不堅小便不熱者宜六味地黃湯一陰煎之類主之若思慮焦勞兼動心火者二陰煎主之格陽喉痹由火不歸原則無根之火客於咽喉而然其證則上熱下寒全非火證凡察此者但診其六脈微弱全無滑大之意且下體絶無火證腹不喜冷即是候也蓋此證必得於色欲傷精或泄瀉傷腎或本無實火而過服寒涼以傷陽氣者皆有此證速宜用鎮陰煎為上八味地黃湯次之或用蜜附子含咽亦妙若再用寒涼必致不救陽虛喉痹非喉痹因於陽虛乃陽虛因於喉痹也蓋有因喉痹而過於攻摯致傷胃氣者有由於飲食倉廩空虛亦傷胃氣者又有氣體素弱不耐勞倦而傷胃氣者凡中氣內虛疼痛外逼多致元陽氣越脈浮而散或弱而澀以致聲如鼻鼾疾如拽鋸者此肺胃垂絶之候速宜挽回元氣以人參濃煎徐飲之如痰多者加竹瀝薑汁遲則不救如作實火治之禍如反掌喉癬證凡陰虛勞損之人多有之其證滿喉生瘡紅痛久不能愈此水虧虛火證也宜用陰虛喉痹之法治之若多咳嗽肺熱宜用四陰煎之類主之若滿喉生瘡破爛而痛者宜用牛黃益金散吹敷之內服滋補真陰之劑自可全愈全書以上數條咽喉並論陰虛陽虛格陽等證較然明白宜細辨之實熱咽痛三黃丸或用黃連荊芥薄荷為末蜜薑汁調噙或山豆根噙之及用黃柏黃連大黃水調塗足心與患處及龍麝聚聖丹祛毒牛黃丸咽喉備急丹浮熱咽病表散之增損如聖湯利膈湯桔梗湯壅熱咽痛或嗽中帶血者宜金沸草散佐以辰砂丸化痰丸準繩三條論實熱浮熱壅熱或問咽喉有痹有腫二者之外又有纏喉風乳蛾生瘡諸病何邪致之何經病之與治法大略願聞其說曰十二經脈皆上循咽喉盡得以病之然統其地氣又曰諸逆衝上皆屬於火是也蓋肺主氣天也脾主濕地也於是喉納氣咽納食納氣者從金化納食者從土化金性燥土性濕至於病也金化變動為燥燥則澀澀則閉塞不仁故在喉謂之痹土化變動為濕濕則泥泥則壅脹不通故在咽謂之腫痹腫之病雖少異然一時火鬱於上焦致痰涎氣血聚結於咽喉也自其咽腫形狀分之則有纏喉風乳蛾之名纏喉風者其腫透達於外且麻且癢且痛乳蛾者腫於咽兩傍名雙乳蛾一邊腫者名單乳蛾喉痹之暴發暴死者名走馬喉痹內經又有嗌塞咽喉乾者亦皆因諸經所致中間雖有經氣之寒熱不等其為火證一也大抵治法視火微甚微則正治甚則反治撩痰出血三者隨宜而施或刺手少商出血行氣若腫達於外者又必外敷余每治此證用鵝翎蘸醋於喉中摘去其痰蓋醋味酸能收其痰隨翎而出又能消積血若乳蛾甚而不散上以小刀就蛾上刺血用馬牙硝吹點咽喉以退火邪服射干青黛甘桔梔芩礬石牛子大黃之類隨其攸利為方以散上焦之熱外所敷藥如生地龍韭根伏龍肝之類皆可用若夫生瘡或白或赤白者多涎赤者多血大率與口瘡同例準繩此論纏喉風乳蛾等證無非因於腫脹之形似立名其原皆起於燥濕君相二火鬱於上焦以致痰涎結聚所致今之專科僅從形似主治徒用家傳祕方觀此可恍然悟矣
